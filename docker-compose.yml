services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-onebrain}
      POSTGRES_USER: ${POSTGRES_USER:-onebrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onebrain}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-onebrain} -d ${POSTGRES_DB:-onebrain}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ONEBRAIN_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-onebrain}:${POSTGRES_PASSWORD:-onebrain}@postgres:5432/${POSTGRES_DB:-onebrain}
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  onebrain-api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      ONEBRAIN_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-onebrain}:${POSTGRES_PASSWORD:-onebrain}@postgres:5432/${POSTGRES_DB:-onebrain}
      DJANGO_SETTINGS_MODULE: onebrain_host.settings
      ONEBRAIN_DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,onebrain-api,0.0.0.0
      ONEBRAIN_DJANGO_DEBUG: "true"
      ONEBRAIN_DJANGO_HOST: 0.0.0.0
      ONEBRAIN_DJANGO_PORT: 8000
      ONEBRAIN_GRAPH_AGGREGATION_SCOPE_JSON: '${ONEBRAIN_GRAPH_AGGREGATION_SCOPE_JSON:-{"catalog":"private-engineering-catalog","source":"github-private-catalog"}}'
      ONEBRAIN_GRAPH_AGGREGATION_INTERVAL_SECONDS: ${ONEBRAIN_GRAPH_AGGREGATION_INTERVAL_SECONDS:-3600}
      ONEBRAIN_GRAPH_AGGREGATION_LIMIT: ${ONEBRAIN_GRAPH_AGGREGATION_LIMIT:-500}
      ONEBRAIN_GRAPH_AGGREGATION_CORRELATION_LIMIT: ${ONEBRAIN_GRAPH_AGGREGATION_CORRELATION_LIMIT:-750}
      ONEBRAIN_GRAPH_AGGREGATION_MAX_DEGREE: ${ONEBRAIN_GRAPH_AGGREGATION_MAX_DEGREE:-12}
      ONEBRAIN_GRAPH_AGGREGATION_GROUPING_LIMIT: ${ONEBRAIN_GRAPH_AGGREGATION_GROUPING_LIMIT:-25}
      ONEBRAIN_GRAPH_AGGREGATION_GROUPING_MIN_SIZE: ${ONEBRAIN_GRAPH_AGGREGATION_GROUPING_MIN_SIZE:-3}
      ONEBRAIN_JOB_STATUS_PATH: /var/lib/onebrain/jobs/status.json
      ONEBRAIN_MEMORY_CLASSIFIER_MODEL_PATH: /var/lib/onebrain/ml/memory-classifier.json
    ports:
      - "127.0.0.1:${ONEBRAIN_API_PORT:-8088}:8000"
    volumes:
      - C:/DoxieOS/github-private-catalog:/mnt/github-private-catalog:ro
      - onebrain_job_status:/var/lib/onebrain/jobs
      - onebrain_ml_artifacts:/var/lib/onebrain/ml
    command: ["onebrain-api"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  onebrain-web:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      ONEBRAIN_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-onebrain}:${POSTGRES_PASSWORD:-onebrain}@postgres:5432/${POSTGRES_DB:-onebrain}
      DJANGO_SETTINGS_MODULE: onebrain_host.settings
      ONEBRAIN_DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,onebrain-web,0.0.0.0
      ONEBRAIN_DJANGO_DEBUG: "true"
      ONEBRAIN_DJANGO_HOST: 0.0.0.0
      ONEBRAIN_DJANGO_PORT: 8000
      ONEBRAIN_GRAPH_AGGREGATION_SCOPE_JSON: '${ONEBRAIN_GRAPH_AGGREGATION_SCOPE_JSON:-{"catalog":"private-engineering-catalog","source":"github-private-catalog"}}'
      ONEBRAIN_GRAPH_AGGREGATION_INTERVAL_SECONDS: ${ONEBRAIN_GRAPH_AGGREGATION_INTERVAL_SECONDS:-3600}
      ONEBRAIN_GRAPH_AGGREGATION_LIMIT: ${ONEBRAIN_GRAPH_AGGREGATION_LIMIT:-500}
      ONEBRAIN_GRAPH_AGGREGATION_CORRELATION_LIMIT: ${ONEBRAIN_GRAPH_AGGREGATION_CORRELATION_LIMIT:-750}
      ONEBRAIN_GRAPH_AGGREGATION_MAX_DEGREE: ${ONEBRAIN_GRAPH_AGGREGATION_MAX_DEGREE:-12}
      ONEBRAIN_GRAPH_AGGREGATION_GROUPING_LIMIT: ${ONEBRAIN_GRAPH_AGGREGATION_GROUPING_LIMIT:-25}
      ONEBRAIN_GRAPH_AGGREGATION_GROUPING_MIN_SIZE: ${ONEBRAIN_GRAPH_AGGREGATION_GROUPING_MIN_SIZE:-3}
      ONEBRAIN_JOB_STATUS_PATH: /var/lib/onebrain/jobs/status.json
      ONEBRAIN_MEMORY_CLASSIFIER_MODEL_PATH: /var/lib/onebrain/ml/memory-classifier.json
    ports:
      - "127.0.0.1:${ONEBRAIN_WEB_PORT:-8089}:8000"
    volumes:
      - onebrain_job_status:/var/lib/onebrain/jobs
      - onebrain_ml_artifacts:/var/lib/onebrain/ml
    command: ["onebrain-web"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/readyz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  onebrain-mcp:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      ONEBRAIN_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-onebrain}:${POSTGRES_PASSWORD:-onebrain}@postgres:5432/${POSTGRES_DB:-onebrain}
      DJANGO_SETTINGS_MODULE: onebrain_host.settings
      ONEBRAIN_DJANGO_HOST: 0.0.0.0
      ONEBRAIN_DJANGO_PORT: 8000
      ONEBRAIN_MCP_PATH_MAPPINGS: "C:\\DoxieOS\\github-private-catalog=/mnt/github-private-catalog"
      ONEBRAIN_MCP_REQUIRE_API_KEY: "true"
      ONEBRAIN_MEMORY_CLASSIFIER_MODEL_PATH: /var/lib/onebrain/ml/memory-classifier.json
    ports:
      - "127.0.0.1:${ONEBRAIN_MCP_PORT:-8090}:8000"
    volumes:
      - C:/DoxieOS/github-private-catalog:/mnt/github-private-catalog:ro
      - onebrain_ml_artifacts:/var/lib/onebrain/ml
    command: ["onebrain-mcp-http"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  onebrain-jobs:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      ONEBRAIN_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-onebrain}:${POSTGRES_PASSWORD:-onebrain}@postgres:5432/${POSTGRES_DB:-onebrain}
      DJANGO_SETTINGS_MODULE: onebrain_host.settings
      ONEBRAIN_GRAPH_AGGREGATION_SCOPE_JSON: '${ONEBRAIN_GRAPH_AGGREGATION_SCOPE_JSON:-{"catalog":"private-engineering-catalog","source":"github-private-catalog"}}'
      ONEBRAIN_GRAPH_AGGREGATION_INTERVAL_SECONDS: ${ONEBRAIN_GRAPH_AGGREGATION_INTERVAL_SECONDS:-3600}
      ONEBRAIN_GRAPH_AGGREGATION_LIMIT: ${ONEBRAIN_GRAPH_AGGREGATION_LIMIT:-500}
      ONEBRAIN_GRAPH_AGGREGATION_CORRELATION_LIMIT: ${ONEBRAIN_GRAPH_AGGREGATION_CORRELATION_LIMIT:-750}
      ONEBRAIN_GRAPH_AGGREGATION_MAX_DEGREE: ${ONEBRAIN_GRAPH_AGGREGATION_MAX_DEGREE:-12}
      ONEBRAIN_GRAPH_AGGREGATION_GROUPING_LIMIT: ${ONEBRAIN_GRAPH_AGGREGATION_GROUPING_LIMIT:-25}
      ONEBRAIN_GRAPH_AGGREGATION_GROUPING_MIN_SIZE: ${ONEBRAIN_GRAPH_AGGREGATION_GROUPING_MIN_SIZE:-3}
      ONEBRAIN_JOB_STATUS_PATH: /var/lib/onebrain/jobs/status.json
      ONEBRAIN_MEMORY_CLASSIFIER_MODEL_PATH: /var/lib/onebrain/ml/memory-classifier.json
    volumes:
      - C:/DoxieOS/github-private-catalog:/mnt/github-private-catalog:ro
      - onebrain_job_status:/var/lib/onebrain/jobs
      - onebrain_ml_artifacts:/var/lib/onebrain/ml
    command: ["onebrain-jobs", "run_scheduled_jobs", "--job", "graph-aggregation"]
    restart: unless-stopped

volumes:
  postgres_data:
    name: ${ONEBRAIN_POSTGRES_VOLUME:-onebrain_postgres_data}
    external: true
  onebrain_job_status:
    name: ${ONEBRAIN_JOB_STATUS_VOLUME:-onebrain_job_status}
    external: true
  onebrain_ml_artifacts:
    name: ${ONEBRAIN_ML_ARTIFACTS_VOLUME:-onebrain_ml_artifacts}
    external: true
