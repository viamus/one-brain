services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-onebrain}
      POSTGRES_USER: ${POSTGRES_USER:-onebrain}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-onebrain}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-onebrain} -d ${POSTGRES_DB:-onebrain}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:v1.17.1
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/qdrant/qdrant", "--version"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ONEBRAIN_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-onebrain}:${POSTGRES_PASSWORD:-onebrain}@postgres:5432/${POSTGRES_DB:-onebrain}
    command: ["alembic", "upgrade", "head"]
    restart: "no"

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      ONEBRAIN_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-onebrain}:${POSTGRES_PASSWORD:-onebrain}@postgres:5432/${POSTGRES_DB:-onebrain}
      ONEBRAIN_QDRANT_URL: http://qdrant:6333
    ports:
      - "${ONEBRAIN_HTTP_PORT:-8080}:8080"
    command: ["uvicorn", "onebrain.api:app", "--host", "0.0.0.0", "--port", "8080"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  mcp-http:
    build: .
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - .env
    environment:
      ONEBRAIN_API_URL: http://api:8080
      ONEBRAIN_MCP_HOST: 0.0.0.0
      ONEBRAIN_MCP_PORT: 8090
      ONEBRAIN_MCP_REQUIRE_API_KEY: "true"
    ports:
      - "${ONEBRAIN_MCP_PORT:-8090}:8090"
    command: ["onebrain-mcp-http"]
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8090/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  qdrant_storage:
