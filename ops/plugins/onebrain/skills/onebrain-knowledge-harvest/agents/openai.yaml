interface:
  display_name: "OneBrain Knowledge Harvest"
  short_description: "Harvest enterprise knowledge into OneBrain with subagent fan-out."
  brand_color: "#C6501B"
  default_prompt: "Use $onebrain-knowledge-harvest with subagent orchestration to harvest this repository into a OneBrain knowledge pack."

dependencies:
  tools:
    - type: "mcp"
      value: "mcp_azuredevops"
      description: "Prefer viamus/mcp-azure-devops for Azure DevOps repositories, work items, pull requests, builds, and wikis when available."

policy:
  allow_implicit_invocation: true
