name: proxy

services:
  traefik:
    image: traefik:v3.6
    container_name: traefik
    command:
      - "--api.dashboard=true"
      - "--api.insecure=true"
      - "--entrypoints.web.address=:80"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=${ONEBRAIN_PROXY_NETWORK:-local_proxy}"
    ports:
      - "127.0.0.1:${ONEBRAIN_PROXY_PORT:-80}:80"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=${ONEBRAIN_PROXY_NETWORK:-local_proxy}"
      - "traefik.http.routers.traefik.entrypoints=web"
      - "traefik.http.routers.traefik.rule=Host(`${ONEBRAIN_TRAEFIK_HOST:-traefik.localhost}`) || Host(`traefik.127.0.0.1.sslip.io`)"
      - "traefik.http.routers.traefik.service=api@internal"
    networks:
      - proxy
    restart: unless-stopped

networks:
  proxy:
    name: ${ONEBRAIN_PROXY_NETWORK:-local_proxy}
